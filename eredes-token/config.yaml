name: E-Redes Token Refresher
version: "1.0.0"
slug: eredes_token_refresher
init: false
description: Renova automaticamente o cookie aat do Balcão Digital E-Redes
url: https://github.com/fagn88/eredes-token-addon
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  6081/tcp: 6081
ports_description:
  6081/tcp: noVNC Web Interface (para login inicial)
hassio_api: true
homeassistant_api: true
options:
  refresh_margin_min: 5
  refresh_margin_max: 25
  ntfy_topic: "eredes-token-fn2026"
  ha_webhook_id: "update_eredes_token"
schema:
  refresh_margin_min: int(1,60)
  refresh_margin_max: int(1,60)
  ntfy_topic: str
  ha_webhook_id: str
